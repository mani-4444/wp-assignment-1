<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnHub - Register and Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>LearnHub</h1>
      <p>Simple online learning website for students</p>
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="details.html">Course Details</a>
      <a class="active" href="register.html">Register / Login</a>
      <a href="contact.html">Contact</a>
    </nav>

    <section class="card">
      <h2>Register / Login</h2>

      <div class="auth-toggle" role="tablist" aria-label="Choose form">
        <button
          type="button"
          id="showRegisterBtn"
          class="active"
          aria-controls="registerPanel"
          aria-selected="true"
        >
          Register
        </button>
        <button
          type="button"
          id="showLoginBtn"
          aria-controls="loginPanel"
          aria-selected="false"
        >
          Login
        </button>
      </div>

      <div id="registerPanel" class="auth-panel">
        <form id="registerForm" novalidate>
          <label for="regName">Name</label>
          <input type="text" id="regName" name="regName" required />

          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" name="regEmail" required />

          <label for="regPassword">Password</label>
          <input
            type="password"
            id="regPassword"
            name="regPassword"
            minlength="6"
            required
          />

          <label for="regConfirmPassword">Confirm Password</label>
          <input
            type="password"
            id="regConfirmPassword"
            name="regConfirmPassword"
            minlength="6"
            required
          />

          <button type="submit">Register</button>
          <p id="regMessage" class="message"></p>
        </form>
      </div>

      <div id="loginPanel" class="auth-panel" hidden>
        <form id="loginForm" novalidate>
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="loginEmail" required />

          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            name="loginPassword"
            minlength="6"
            required
          />

          <button type="submit">Login</button>
          <p id="loginMessage" class="message"></p>
        </form>
      </div>
    </section>

    <footer>
      <p>2026 LearnHub - Web Programming Assignment</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
