<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnHub - Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>LearnHub</h1>
      <p>Simple online learning website for students</p>
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="details.html">Course Details</a>
      <a href="register.html">Register / Login</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>

    <section class="card">
      <h2>Contact</h2>
      <p><strong>Address:</strong> LearnHub, Hyderabad</p>
      <p><strong>Email:</strong> support@learnhub.com</p>
      <p><strong>Phone:</strong> +91 99999 99999</p>

      <h3>Inquiry Form</h3>
      <form id="contactForm" novalidate>
        <label for="contactName">Name</label>
        <input type="text" id="contactName" name="contactName" required />

        <label for="contactEmail">Email</label>
        <input type="email" id="contactEmail" name="contactEmail" required />

        <label for="contactMessage">Message</label>
        <textarea
          id="contactMessage"
          name="contactMessage"
          rows="4"
          required
        ></textarea>

        <button type="submit">Send</button>
        <p id="contactMessageStatus" class="message"></p>
      </form>
    </section>

    <footer>
      <p>2026 LearnHub - Web Programming Assignment</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
